<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MutaCure AR — Protein Structures</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0d1a0f;
      font-family:'DM Mono','Fira Code',monospace;
      color:#e8f0e8;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .header {
      text-align:center;
      margin-bottom:28px;
    }
    .header-logo {
      display:flex; align-items:center;
      justify-content:center; gap:10px;
      margin-bottom:8px;
    }
    .header-icon {
      width:36px; height:36px; border-radius:10px;
      background:rgba(74,163,84,0.15);
      border:1px solid rgba(74,163,84,0.3);
      display:flex; align-items:center; justify-content:center;
    }
    .header-title {
      font-family:'DM Sans',sans-serif;
      font-size:20px; font-weight:700; color:#e8f0e8;
    }
    .header-title span { color:#6fcf7a; }
    .header-sub {
      font-size:11px;
      color:rgba(232,240,232,0.35);
      letter-spacing:0.05em;
    }

    /* ── 2x2 Grid ── */
    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      width:100%;
      max-width:560px;
    }

    .cell {
      position:relative;
      background:#111d13;
      border:1px solid rgba(74,163,84,0.15);
      border-radius:12px;
      overflow:hidden;
      transition:border-color 0.2s;
    }
    .cell:hover {
      border-color:rgba(74,163,84,0.4);
    }

    .cell img {
      width:100%;
      height:180px;
      object-fit:cover;
      display:block;
      background:#f5f0e8;
    }

    .cell-info {
      padding:10px 12px;
      border-top:1px solid rgba(74,163,84,0.1);
    }
    .cell-protein {
      font-size:14px;
      font-weight:600;
      color:#6fcf7a;
      font-family:'DM Sans',sans-serif;
      margin-bottom:2px;
    }
    .cell-disease {
      font-size:10px;
      color:rgba(232,240,232,0.4);
      text-transform:uppercase;
      letter-spacing:0.06em;
    }

    /* Risk badge */
    .cell-risk {
      position:absolute;
      top:8px; right:8px;
      padding:3px 8px;
      border-radius:20px;
      font-size:10px;
      font-family:monospace;
      font-weight:600;
    }
    .risk-high {
      background:rgba(224,92,92,0.2);
      border:1px solid rgba(224,92,92,0.4);
      color:#e05c5c;
    }
    .risk-med {
      background:rgba(240,165,0,0.2);
      border:1px solid rgba(240,165,0,0.4);
      color:#f0a500;
    }

    /* Back link */
    .back-link {
      margin-top:24px;
      font-size:11px;
      color:rgba(232,240,232,0.3);
      text-decoration:none;
      transition:color 0.15s;
    }
    .back-link:hover { color:#6fcf7a; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="#6fcf7a" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="header-title">MutaCure <span>AR</span></span>
    </div>
    <p class="header-sub">Therapeutic Protein Structures</p>
  </div>

  <!-- 2x2 Grid -->
  <div class="grid">

    <div class="cell">
      <img src="protein1.png" alt="PPARG"/>
      <span class="cell-risk risk-high">0.87</span>
      <div class="cell-info">
        <div class="cell-protein">PPARG</div>
        <div class="cell-disease">Type 2 Diabetes · TCF7L2</div>
      </div>
    </div>

    <div class="cell">
      <img src="protein2.png" alt="BRCA1"/>
      <span class="cell-risk risk-high">0.79</span>
      <div class="cell-info">
        <div class="cell-protein">BRCA1</div>
        <div class="cell-disease">Breast Cancer · BRCA1</div>
      </div>
    </div>

    <div class="cell">
      <img src="protein3.png" alt="EGFR"/>
      <span class="cell-risk risk-med">0.74</span>
      <div class="cell-info">
        <div class="cell-protein">EGFR</div>
        <div class="cell-disease">Lung Cancer · EGFR</div>
      </div>
    </div>

    <div class="cell">
      <img src="protein4.png" alt="APOE"/>
      <span class="cell-risk risk-med">0.62</span>
      <div class="cell-info">
        <div class="cell-protein">APOE</div>
        <div class="cell-disease">Alzheimer's · APOE</div>
      </div>
    </div>

  </div>

  <a href="/protein" class="back-link">← Back to Protein Explorer</a>

</body>
</html>
